<!DOCTYPE html>
<html>
<head>
  <title>Just For You 🤍</title>
  <style>
    body { margin:0; padding:0; background:#141e30; color:white; font-family:Arial; text-align:center; }
    .box { margin-top:120px; }
    button { padding:12px 25px; font-size:16px; border:none; border-radius:25px; background:#ff4d6d; color:white; cursor:pointer; }
    button:hover { background:#ff1e4d; }
    .hidden { display:none; margin-top:30px; font-size:20px; }
  </style>
</head>
<body>

<div class="box">
  <h1>Open Only If You Miss Me 😌</h1>
  <button onclick="showMessage()">Tap Here</button>
  <div class="hidden" id="message">
    <p>Happy Birthday 🤍</p>
    <p>No matter what happens… I am always with you.</p>
    <p>Still yours. Always yours. ✨</p>
  </div>
</div>

<script>
function showMessage() {
  document.getElementById("message").style.display = "block";
}
</script>

</body>
</html>
