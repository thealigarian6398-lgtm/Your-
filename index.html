<<!-- Romantic Music + Hearts Animation -->
<audio id="bgmusic" autoplay loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<style>
  .heart {
    position: absolute;
    width: 20px;
    height: 20px;
    background: red;
    transform: rotate(45deg);
    animation: float 4s linear infinite;
  }
  .heart:after, .heart:before {
    content: "";
    position: absolute;
    width: 20px;
    height: 20px;
    background: red;
    border-radius: 50%;
  }
  .heart:before { top: -10px; left: 0; }
  .heart:after { left: 10px; top: 0; }

  @keyframes float {
    0% { transform: translateY(0) rotate(45deg); opacity:1; }
    100% { transform: translateY(-500px) rotate(45deg); opacity:0; }
  }
</style>

<script>
  // Add floating hearts every 0.3s
  setInterval(() => {
    let heart = document.createElement('div');
    heart.className = 'heart';
    heart.style.left = Math.random() * window.innerWidth + 'px';
    heart.style.background = 'red';
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 4000);
  }, 300);

  // Auto play music
  let music = document.getElementById('bgmusic');
  music.volume = 0.3;
  music.play();
</script>!DOCTYPE html>
<html>
<head>
  <title>Just For You 🤍</title>
  <style>
    body { margin:0; padding:0; background:#141e30; color:white; font-family:Arial; text-align:center; }
    .box { margin-top:120px; }
    button { padding:12px 25px; font-size:16px; border:none; border-radius:25px; background:#ff4d6d; color:white; cursor:pointer; }
    button:hover { background:#ff1e4d; }
    .hidden { display:none; margin-top:30px; font-size:20px; }
  </style>
</head>
<body>

<div class="box">
  <h1>Open Only If You Miss Me 😌</h1>
  <button onclick="showMessage()">Tap Here</button>
  <div class="hidden" id="message">
    <p>Happy Birthday 🤍</p>
    <p>No matter what happens… I am always with you.</p>
    <p>Still yours. Always yours. ✨</p>
  </div>
</div>

<script>
function showMessage() {
  document.getElementById("message").style.display = "block";
}
</script>

</body>
</html>
